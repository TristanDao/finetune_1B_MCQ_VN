# Shared defaults for all training configs in this repo.
# Override per-config under configs/.

seed: 3407
output_root: artifacts

# Data (đường dẫn tương đối repo root)
data:
  train_jsonl: data/processed/final/train.jsonl
  eval_jsonl:  data/processed/final/eval.jsonl
  max_seq_length: 2048

# Tokenizer
tokenizer:
  use_fast: true
  trust_remote_code: true

# Attention implementation: "eager" (mặc định, luôn chạy), "sdpa" (PyTorch native),
# hoặc "flash_attention_2" (cần pip install flash-attn, nhanh hơn 2-4x trên A100)
attn_implementation: flash_attention_2

# System prompt (cố định, dùng cả train và eval)
system_prompt: "Bạn là hệ thống trả lời trắc nghiệm. Chỉ xuất duy nhất 1 ký tự A/B/C/D."
