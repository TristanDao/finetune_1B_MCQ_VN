# Full fine-tune bf16 trên Qwen3-0.6B
# Tốn VRAM hơn QLoRA nhưng chất lượng thường cao hơn.
# Chỉ chạy trên A100 40/80GB.
extends: base.yaml

run_name: fullft_qwen3_0_6b
model_name: Qwen/Qwen3-0.6B

# Không quant
quant: null

# Không LoRA
lora: null

# Training
training:
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4          # effective batch = 32
  num_train_epochs: 3
  max_steps: -1
  learning_rate: 5.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  logging_steps: 20
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  max_grad_norm: 1.0
  optim: adamw_torch
  gradient_checkpointing: true
  torch_compile: true
  packing: true
  assistant_only_loss: true
  seed: 3407
