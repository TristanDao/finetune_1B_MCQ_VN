# Unsloth QLoRA 4-bit — conversation mode (short answer)
# Train: python scripts/train.py --mode conversation
model_name: Qwen/Qwen3-0.6B
mode: conversation
max_seq_length: 2048
lora_r: 32
lora_alpha: 16
lora_dropout: 0.0
per_device_train_batch_size: 4
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 3
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.06
seed: 3407
